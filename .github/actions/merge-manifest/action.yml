name: 'Merge manifest'
description: 'Log in, collect per-platform digests, and push a multi-arch manifest'
inputs:
  image:
    required: true
  tags:
    required: true
  username:
    required: true
  token:
    required: true
runs:
  using: 'composite'
  steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.username }}
        password: ${{ inputs.token }}
    - name: Download digests
      uses: actions/download-artifact@v8
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-*
        merge-multiple: true
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Create manifest list and push
      shell: bash
      env:
        IMAGE_BASE: ${{ inputs.image }}
        TAGS: ${{ inputs.tags }}
      working-directory: ${{ runner.temp }}/digests
      run: |
        args=()
        while IFS= read -r tag; do
          [ -n "$tag" ] && args+=("-t" "$tag")
        done <<< "$TAGS"
        refs=()
        for digest in *; do
          refs+=("${IMAGE_BASE}@sha256:${digest}")
        done
        docker buildx imagetools create --prefer-index=true "${args[@]}" "${refs[@]}"
