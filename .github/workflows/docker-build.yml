name: Docker Build

on:
  workflow_call:
    inputs:
      tag:
        description: "Docker image tag"
        required: true
        type: string
      latest:
        description: "Also tag as latest"
        required: false
        type: boolean
        default: false
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_ACCESS_TOKEN:
        required: true

permissions:
  contents: read

env:
  image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            scope: prod-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            scope: prod-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: ./.github/actions/build-digest
        with:
          image: ${{ env.image }}
          target: ${{ matrix.scope }}
          artifact-name: digests-${{ matrix.scope }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
          provenance: mode=max
          sbom: 'true'
          extra-set: |
            *.cache-from=type=gha,scope=${{ matrix.scope }}
            *.cache-to=type=gha,scope=${{ matrix.scope }},mode=max
            *.labels.org.opencontainers.image.title=${{ vars.APP_NAME }}
            *.labels.org.opencontainers.image.version=${{ inputs.tag }}
            *.labels.org.opencontainers.image.revision=${{ inputs.ref || github.sha }}

  manifest:
    name: Create Manifest
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - uses: actions/checkout@v5

      - name: Setup Docker Metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.image }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.latest }}

      - uses: ./.github/actions/merge-manifest
        with:
          image: ${{ env.image }}
          tags: ${{ steps.meta.outputs.tags }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Verify image
        run: |
          docker buildx imagetools inspect ${{ env.image }}:${{ inputs.tag }} --format '{{json .Manifest}}'
