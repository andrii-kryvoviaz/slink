name: CI

on:
  workflow_call:

  push:
    paths:
      - "services/**"
      - "docker/**"
      - "docker-bake.hcl"

  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"
      - "docker/**"
      - "docker-bake.hcl"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'services/api/**'
              - 'docker/docker-compose.storage-test.yaml'
            frontend:
              - 'services/client/**'

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: PHPStan Static Analysis
        uses: ./.github/actions/phpstan

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: PHPUnit tests
        uses: ./.github/actions/phpunit

  storage-test:
    name: Storage Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Start storage backends
        run: docker compose -f docker/docker-compose.storage-test.yaml -p slink-storage-test up -d --wait

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: ffi, vips, gd
          tools: composer:v2
          coverage: none

      - name: Install smbclient
        run: sudo apt-get install -y smbclient

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: services/api/vendor
          key: composer-${{ hashFiles('services/api/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: services/api
        run: composer install --ignore-platform-reqs --no-interaction --no-scripts

      - name: Run storage integration tests
        working-directory: services/api
        run: vendor/bin/phpunit --group storage-integration --no-coverage

      - name: Dump backend logs
        if: failure()
        run: |
          docker compose -f docker/docker-compose.storage-test.yaml -p slink-storage-test logs
          docker ps -a

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "yarn"
          cache-dependency-path: "./services/client/yarn.lock"

      - name: Install dependencies
        run: yarn --cwd ./services/client install --frozen-lockfile

      - name: Run ESLint
        run: yarn --cwd ./services/client run lint

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: E2E Tests
        uses: ./.github/actions/e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/client/playwright-report/

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: services/client/test-results/

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, backend-lint, backend-test, storage-test, frontend-lint, e2e-test]
    steps:
      - name: Check CI status
        if: contains(needs.*.result, 'failure')
        run: exit 1
