imports:
  - { resource: 'settings.yaml' }
  - { resource: 'services/*.yaml' }

parameters:
  slink.runtime_dir: '/app/etc/runtime'
  image.public_max_width: 1920

  exception_to_status:
    Slink\Share\Domain\Exception\SharePasswordRequiredException: 423
    Slink\Share\Domain\Exception\ShareExpiredException: 410
    Slink\User\Domain\Exception\InvalidCredentialsException: 400
    Slink\User\Domain\Exception\ForbiddenException: 403
    Slink\Shared\Domain\Exception\ForbiddenException: 403
    Slink\User\Domain\Exception\ApiKeyNotFoundException: 404
    Slink\Shared\Infrastructure\Exception\NotFoundException: 404
    Slink\Shared\Domain\Exception\DemoForbiddenException: 403
    Slink\User\Domain\Exception\OidcDiscoveryException: 502
    Slink\Image\Infrastructure\ChunkedUpload\Exception\InvalidUploadTokenException: 401
    Slink\Image\Infrastructure\ChunkedUpload\Exception\ExpiredUploadTokenException: 410
    Slink\Image\Infrastructure\ChunkedUpload\Exception\ChunkIndexOutOfRangeException: 422
    Slink\Image\Infrastructure\ChunkedUpload\Exception\ChunkTooLargeException: 413
    LogicException: 400
    InvalidArgumentException: 400

  exception_code_to_message:
    400: 'Bad Request'
    401: 'Unauthorized'
    403: 'Forbidden'
    404: 'Not Found'
    410: 'Gone'
    413: 'Payload Too Large'
    422: 'Unprocessable Entity'
    423: 'Locked'
    500: 'Internal Server Error'
    502: 'Bad Gateway'

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  _instanceof:
    Slink\Shared\Application\Command\CommandHandlerInterface:
      public: true
      tags:
        - { name: messenger.message_handler, bus: messenger.bus.command }

    Slink\Shared\Application\Query\QueryHandlerInterface:
      public: true
      tags:
        - { name: messenger.message_handler, bus: messenger.bus.query }

    Slink\Shared\Infrastructure\MessageBus\Event\EventHandlerInterface:
      public: true
      tags:
        - { name: messenger.message_handler, bus: messenger.bus.event.async }

    Slink\Share\Domain\AccessRule\ShareAccessRule:
      tags: ['slink.share.access_rule']

  Slink\:
    resource: '../src/Slink/*'
    exclude: '../src/Slink/**/{Migrations,Kernel.php}'

  UI\:
    resource: '../src/UI/*'
    exclude: '../src/UI/Console/**/Abstract*'

  Slink\Shared\Infrastructure\MessageBus\Command\MessengerCommandBus:
    arguments:
      - '@messenger.bus.command'

  Slink\Shared\Infrastructure\MessageBus\Query\MessengerQueryBus:
    arguments:
      - '@messenger.bus.query'

  Slink\Shared\Infrastructure\MessageBus\Event\MessengerEventBus:
    arguments:
      - '@messenger.bus.event'

  UI\Http\Rest\EventSubscriber\ExceptionSubscriber:
    arguments:
      - '@logger'
      - '%kernel.environment%'
      - '%exception_to_status%'
      - '%exception_code_to_message%'

  Symfony\Component\Dotenv\Command\DotenvDumpCommand: ~
